# Skymmich Production Docker Compose Configuration (SQLite — no external database needed)
# Uses pre-built images from GitHub Container Registry
#
# Quick start:
#   docker compose -f docker-compose.prod.yml up -d
#
# For PostgreSQL instead of SQLite, layer the postgres override:
#   docker compose -f docker-compose.prod.yml -f docker-compose.postgres.yml up -d

services:
  skymmich:
    image: ghcr.io/mstelz/skymmich:latest
    container_name: skymmich
    restart: unless-stopped
    ports:
      - "${SKYMMICH_PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - XMP_SIDECAR_PATH=/app/sidecars
    volumes:
      - skymmich-config:/app/config
      - skymmich-logs:/app/logs
      - skymmich-sidecars:/app/sidecars
      - skymmich-cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  skymmich-config:
    driver: local
  skymmich-logs:
    driver: local
  skymmich-sidecars:
    driver: local
  skymmich-cache:
    driver: local
