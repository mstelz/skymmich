# Skymmich Docker Compose Configuration (SQLite — no external database needed)
#
# Usage: docker compose up -d
#
# For PostgreSQL instead of SQLite, layer the postgres override:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d

services:
  skymmich:
    build: .
    container_name: skymmich
    restart: unless-stopped
    ports:
      - "${SKYMMICH_PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - XMP_SIDECAR_PATH=/app/sidecars
      - IMMICH_MAPPING_PATH=/usr/src/app/upload
      - LOCAL_MAPPING_PATH=/immich-upload
      - AUTO_DB_MIGRATE_FROM=${AUTO_DB_MIGRATE_FROM:-}
      - AUTO_DB_MIGRATE_TO=${AUTO_DB_MIGRATE_TO:-}
      - AUTO_DB_MIGRATE_ONCE=${AUTO_DB_MIGRATE_ONCE:-true}
      - AUTO_DB_MIGRATE_MARKER=${AUTO_DB_MIGRATE_MARKER:-/app/config/.auto-db-migrated}
      - AUTO_DB_MIGRATE_RESET_SQLITE=${AUTO_DB_MIGRATE_RESET_SQLITE:-true}
    volumes:
      - skymmich-config:/app/config
      - skymmich-logs:/app/logs
      - skymmich-sidecars:/app/sidecars
      - skymmich-cache:/app/cache
      - skymmich_immich-upload:/immich-upload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  skymmich-config:
    driver: local
  skymmich-logs:
    driver: local
  skymmich-sidecars:
    driver: local
  skymmich-cache:
    driver: local
  skymmich_immich-upload:
    external: true
